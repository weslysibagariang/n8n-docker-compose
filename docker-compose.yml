services:
  postgres:
    image: postgres:16
    container_name: n8n-postgres
    env_file:
      - .env
    # environment:
    #   POSTGRES_USER: <YOUR DATABASE USER>
    #   POSTGRES_PASSWORD: <YOUR DATABASE PASSWORD>
    #   POSTGRES_DB: <YOUR DATABASE NAME>
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    # environment:
    #   GENERIC_TIMEZONE: <YOUR TIMEZONE>
    #   TZ: <YOUR TIMEZONE>
    #   N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
    #   N8N_RUNNERS_ENABLED: "true"
    #   DB_TYPE: postgresdb
    #   DB_POSTGRESDB_DATABASE: <YOUR DATABASE NAME>
    #   DB_POSTGRESDB_HOST: postgres
    #   DB_POSTGRESDB_PORT: 5432
    #   DB_POSTGRESDB_USER: <YOUR DATABASE USER>
    #   DB_POSTGRESDB_SCHEMA: <YOUR DATABASE SCHEMA>
    #   DB_POSTGRESDB_PASSWORD: <YOUR DATABASE PASSWORD>
    #   N8N_CUSTOM_EXTENSIONS: "/home/node/.n8n/custom"
    #   AWS_PROFILE: <YOUR AWS PROFILE>
    #   AWS_REGION: <YOUR AWS REGION>
    volumes:
      - n8n_data:/home/node/.n8n
      - /<YOUR N8N CUSTOM EXTENSIONS PATH>:/home/node/.n8n/custom
      - ~/.aws:/home/node/.aws:ro    
    restart: unless-stopped

volumes:
  n8n_data:
  pg_data:
